name: IntentOS PR Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  intentos-pr-checks:
    name: IntentOS PR Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: IntentOS self-check
        run: node scripts/check-intentos.mjs

      - name: Release verify
        run: npm run verify

      - name: Manifest check
        run: node scripts/check-manifest.mjs

      - name: Product baseline check
        run: node scripts/check-product-baseline.mjs .

      - name: Claim control check
        run: node scripts/check-claim-control.mjs .

      - name: Context governance check
        run: node scripts/check-context-governance.mjs .

      - name: Launch readiness check
        run: node scripts/check-launch-readiness.mjs .

      - name: Conversation drift check
        run: node scripts/check-conversation-drift.mjs .

      - name: First delivery walkthrough check
        run: node scripts/check-first-delivery-walkthrough.mjs .

      - name: Real adoption trial check
        run: node scripts/check-real-adoption-trial.mjs .

      - name: Patch classification check
        run: node scripts/check-patch-classification.mjs .

      - name: Workflow adoption map check
        run: node scripts/check-workflow-adoption-map.mjs .

      - name: Workflow map smoke
        run: node scripts/cli.mjs workflow-map .

      - name: Document lifecycle check
        run: node scripts/check-document-lifecycle.mjs .

      - name: Document lifecycle smoke
        run: node scripts/cli.mjs doc-lifecycle .

      - name: Document archive apply check
        run: node scripts/check-document-archive-apply.mjs .

      - name: Document archive apply smoke
        run: node scripts/cli.mjs archive-apply .

      - name: Unified apply plan check
        run: node scripts/check-apply-plan.mjs .

      - name: Unified apply plan resolver smoke
        run: node scripts/resolve-apply-plan.mjs . --intent "maintain IntentOS apply plan" --action workflow-assets

      - name: Unified apply plan smoke
        run: node scripts/cli.mjs apply-plan . --intent "maintain IntentOS apply plan" --action workflow-assets

      - name: Controlled apply readiness check
        run: node scripts/check-controlled-apply-readiness.mjs .

      - name: Controlled apply readiness smoke
        run: node scripts/cli.mjs apply-readiness . --plan examples/1.34-unified-apply-plan/apply-plans/001-existing-project.md --git-state clean

      - name: Approval record check
        run: node scripts/check-approval-record.mjs .

      - name: Approval record smoke
        run: node scripts/cli.mjs approval-record-check .

      - name: Beginner entry check
        run: node scripts/check-beginner-entry.mjs .

      - name: Beginner entry resolver smoke
        run: node scripts/resolve-beginner-entry.mjs . --goal "maintain IntentOS beginner entry"

      - name: Beginner entry smoke
        run: node scripts/cli.mjs ask . "maintain IntentOS beginner entry"

      - name: Conversation-native ask check
        run: node scripts/check-conversation-native-ask.mjs .

      - name: Work queue check
        run: node scripts/check-work-queue.mjs .

      - name: Work queue smoke
        run: node scripts/cli.mjs work-queue .

      - name: Hook orchestration check
        run: node scripts/check-hook-orchestration.mjs .

      - name: Hook orchestration smoke
        run: node scripts/cli.mjs hook-plan .

      - name: Project hook policy check
        run: node scripts/check-hook-policy.mjs .

      - name: Project hook policy smoke
        run: node scripts/cli.mjs hook-policy .

      - name: Workflow guidance check
        run: node scripts/check-workflow-guidance.mjs .

      - name: Workflow guidance smoke
        run: node scripts/cli.mjs guide .

      - name: Deep workflow guidance smoke
        run: node scripts/cli.mjs guide . --deep

      - name: Intent-aware deep workflow guidance smoke
        run: node scripts/cli.mjs guide . --deep --intent "maintain IntentOS guidance"

      - name: Review surface check
        run: node scripts/check-review-surface.mjs .

      - name: Review surface smoke
        run: node scripts/cli.mjs review-surface .

      - name: Business rule closure check
        run: node scripts/check-business-rule-closure.mjs . --allow-empty

      - name: Business rule closure example strict check
        run: node scripts/check-business-rule-closure.mjs examples/1.75-business-rule-closure/appointment-service-time --require-structured-evidence

      - name: Business rule closure smoke
        run: node scripts/cli.mjs business-rule . --intent "appointment requests must include a service time"

      - name: Change impact coverage check
        run: node scripts/check-change-impact-coverage.mjs .

      - name: Structured change impact coverage example
        run: node scripts/check-change-impact-coverage.mjs examples/1.49-structured-impact-coverage/contract-input-rule --require-structured-evidence --mode closure --strict-evidence --resolve-evidence-refs

      - name: Impact-linked execution closure example
        run: node scripts/check-execution-closure.mjs examples/1.49-structured-impact-coverage/contract-input-rule --require-impact-coverage

      - name: Change impact coverage smoke
        run: node scripts/cli.mjs impact-coverage . --intent "maintain IntentOS change impact coverage"

      - name: Delivery path check
        run: node scripts/check-delivery-path.mjs .

      - name: Delivery path smoke
        run: node scripts/cli.mjs delivery-path .

      - name: Debt handoff check
        run: node scripts/check-debt-handoff.mjs .

      - name: Debt handoff smoke
        run: node scripts/cli.mjs debt-handoff .

      - name: Execution closure check
        run: node scripts/check-execution-closure.mjs .

      - name: Execution closure smoke
        run: node scripts/cli.mjs closure . --intent "maintain IntentOS closure" --verification "npm run verify passed"

      - name: Evidence-linked execution closure smoke
        run: node scripts/cli.mjs closure examples/1.33-evidence-linked-closure --intent "finish booking validation" --review-surface-ref review-surface-cards/001-booking.md --review-loop-ref review-loop-reports/001-booking.md --change-boundary-ref change-boundary-reports/001-booking.md --verification-file reports/verify-output.txt --debt-handoff-ref debt-handoff-reports/001-booking.md --delivery-path-ref delivery-path-reports/001-booking.md

      - name: Guided delivery check
        run: node scripts/check-guided-delivery-loop.mjs .

      - name: Change boundary check
        run: node scripts/check-change-boundary.mjs .

      - name: Baseline state check
        run: node scripts/check-baseline-state.mjs .

      - name: Baseline decision smoke
        run: node scripts/cli.mjs baseline-decision .

      - name: Baseline decision check
        run: node scripts/cli.mjs baseline-decision-check .

      - name: Baseline decision example strict check
        run: node scripts/check-guided-baseline-selection.mjs examples/1.17-guided-baseline-selection/new-miniprogram --strict

      - name: Standard baseline recommendation smoke
        run: node scripts/cli.mjs standard-baseline .

      - name: Standard baseline pack check
        run: node scripts/check-standard-baseline-pack.mjs .

      - name: Standard baseline selection check
        run: node scripts/check-standard-baseline-selection.mjs .

      - name: Baseline pack umbrella smoke
        run: node scripts/cli.mjs baseline-packs .

      - name: Baseline pack selection check
        run: node scripts/check-baseline-pack-selection.mjs .

      - name: Baseline selection precision check
        run: node scripts/check-baseline-selection-precision.mjs .

      - name: Fixture suite
        run: node scripts/check-fixtures.mjs

      - name: Recursive script syntax
        run: find scripts -name '*.mjs' -print0 | xargs -0 -n1 node --check

      - name: Output quality example
        run: node scripts/score-output-quality.mjs examples/goal-subagent-l2-feature --min-score 80

      - name: Glossary usage
        run: node scripts/check-glossary-usage.mjs .

      - name: Generated-project smoke
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          node scripts/init-project.mjs --starter generic-project --target "$tmp/project"
          node "$tmp/project/scripts/check-ai-workflow.mjs" "$tmp/project" --mode core
          node "$tmp/project/scripts/workflow-next.mjs" "$tmp/project"
          node "$tmp/project/scripts/start-project.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-guided-adoption.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-project-onboarding.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-engineering-baseline.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-product-baseline.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-claim-control.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-context-governance.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-launch-readiness.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-conversation-drift.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-first-delivery-walkthrough.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-real-adoption-trial.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-patch-classification.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-workflow-adoption-map.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-existing-workflow.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-document-lifecycle.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-document-lifecycle.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-document-archive-apply.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-document-archive-apply.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-apply-plan.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-apply-plan.mjs" "$tmp/project" --intent "bootstrap workflow assets" --action workflow-assets
          node "$tmp/project/scripts/check-controlled-apply-readiness.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-controlled-apply-readiness.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-beginner-entry.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-beginner-entry.mjs" "$tmp/project" --goal "build an appointment app"
          node "$tmp/project/scripts/check-conversation-native-ask.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-work-queue.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-work-queue.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-hook-orchestration.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-hook-orchestration.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-hook-policy.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-hook-policy.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-workflow-guidance.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-workflow-guidance.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-workflow-guidance.mjs" "$tmp/project" --deep
          node "$tmp/project/scripts/resolve-workflow-guidance.mjs" "$tmp/project" --deep --intent "build an appointment app"
          node "$tmp/project/scripts/check-review-surface.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-review-surface.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-business-rule-closure.mjs" "$tmp/project" --allow-empty
          node "$tmp/project/scripts/resolve-business-rule-closure.mjs" "$tmp/project" --intent "appointment requests must include a service time"
          node "$tmp/project/scripts/resolve-business-rule-closure.mjs" "$tmp/project" --intent "appointment requests must include a service time" --out business-rule-closures/001-generated-service-time.md
          node "$tmp/project/scripts/check-business-rule-closure.mjs" "$tmp/project" --report business-rule-closures/001-generated-service-time.md --require-structured-evidence
          node "$tmp/project/scripts/check-change-impact-coverage.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-change-impact-coverage.mjs" "$tmp/project" --intent "generated project validation rule" --business-rule-ref "artifact:business-rule-closures/001-appointment-requests-must-include-a-service-time.md"
          node "$tmp/project/scripts/resolve-change-impact-coverage.mjs" "$tmp/project" --intent "appointment requests must include a service time" --business-rule-ref "artifact:business-rule-closures/001-generated-service-time.md" > "$tmp/project/change-impact-coverage-reports/001-generated-service-time.md"
          node "$tmp/project/scripts/check-change-impact-coverage.mjs" "$tmp/project" --report change-impact-coverage-reports/001-generated-service-time.md --require-business-rule-ready
          node "$tmp/project/scripts/resolve-verification-plan.mjs" "$tmp/project" --intent "appointment requests must include a service time" --business-rule-ref "artifact:business-rule-closures/001-generated-service-time.md" --impact-ref "artifact:change-impact-coverage-reports/001-generated-service-time.md" --project-level BL1 --platform web,backend --out verification-plans/001-generated-service-time.md
          node "$tmp/project/scripts/check-verification-plan.mjs" "$tmp/project" --report verification-plans/001-generated-service-time.md --require-structured-evidence --require-business-rule-ref --require-impact-ref --strict-source-binding
          node "$tmp/project/scripts/check-delivery-path.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-delivery-path.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-debt-handoff.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-debt-handoff.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-execution-closure.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-execution-closure.mjs" "$tmp/project" --intent "finish appointment app" --verification "npm run verify passed"
          node "$tmp/project/scripts/resolve-execution-assurance.mjs" "$tmp/project" --intent "verify generated project execution"
          node "$tmp/project/scripts/check-execution-assurance.mjs" "$tmp/project" --allow-empty
          node "$tmp/project/scripts/cli.mjs" execution-assurance "$tmp/project" --intent "verify generated project execution" --out execution-assurance-reports/001-generated.md
          node "$tmp/project/scripts/cli.mjs" execution-assurance-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" guide "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" guide "$tmp/project" --deep
          node "$tmp/project/scripts/cli.mjs" guide "$tmp/project" --deep --intent "build an appointment app"
          node "$tmp/project/scripts/cli.mjs" guide-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" ask "$tmp/project" "build an appointment app"
          node "$tmp/project/scripts/cli.mjs" ask-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" review-surface "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" review-surface-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" business-rule "$tmp/project" --intent "appointment requests must include a service time"
          node "$tmp/project/scripts/cli.mjs" business-rule-check "$tmp/project" --allow-empty
          node "$tmp/project/scripts/cli.mjs" business-rule "$tmp/project" --intent "appointment requests must include a service time" --out business-rule-closures/001-cli-generated-service-time.md
          node "$tmp/project/scripts/cli.mjs" business-rule-check "$tmp/project" --report business-rule-closures/001-cli-generated-service-time.md --require-structured-evidence
          node "$tmp/project/scripts/cli.mjs" impact-coverage "$tmp/project" --intent "generated project validation rule" --business-rule-ref "artifact:business-rule-closures/001-appointment-requests-must-include-a-service-time.md"
          node "$tmp/project/scripts/cli.mjs" impact-coverage "$tmp/project" --intent "appointment requests must include a service time" --business-rule-ref "artifact:business-rule-closures/001-cli-generated-service-time.md" > "$tmp/project/change-impact-coverage-reports/001-cli-generated-service-time.md"
          node "$tmp/project/scripts/cli.mjs" impact-coverage-check "$tmp/project" --report change-impact-coverage-reports/001-cli-generated-service-time.md --require-business-rule-ready
          node "$tmp/project/scripts/cli.mjs" verification-plan "$tmp/project" --intent "appointment requests must include a service time" --business-rule-ref "artifact:business-rule-closures/001-cli-generated-service-time.md" --impact-ref "artifact:change-impact-coverage-reports/001-cli-generated-service-time.md" --project-level BL1 --platform web,backend --out verification-plans/001-cli-generated-service-time.md
          node "$tmp/project/scripts/cli.mjs" verification-plan-check "$tmp/project" --report verification-plans/001-cli-generated-service-time.md --require-structured-evidence --require-business-rule-ref --require-impact-ref --strict-source-binding
          node "$tmp/project/scripts/cli.mjs" impact-coverage-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" delivery-path "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" closure "$tmp/project" --intent "finish appointment app" --verification "npm run verify passed"
          node "$tmp/project/scripts/cli.mjs" closure-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" execution-assurance "$tmp/project" --intent "verify generated project execution"
          node "$tmp/project/scripts/cli.mjs" execution-assurance-check "$tmp/project" --allow-empty
          node "$tmp/project/scripts/cli.mjs" done-check "$tmp/project" --allow-empty
          node "$tmp/project/scripts/cli.mjs" verify-execution "$tmp/project" --allow-empty
          node "$tmp/project/scripts/cli.mjs" delivery-path-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" debt-handoff "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" debt-handoff-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" baseline-decision "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" baseline-decision-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" workflow-map "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" workflow-map-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" convergence "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" convergence-check "$tmp/project"
          convergence_report="$tmp/governance-convergence.md"
          node "$tmp/project/scripts/resolve-governance-convergence.mjs" "$tmp/project" > "$convergence_report"
          node "$tmp/project/scripts/check-governance-convergence.mjs" "$tmp/project" --report "$convergence_report" --require-structured-evidence
          node "$tmp/project/scripts/cli.mjs" adoption-assurance "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" adoption-assurance-check "$tmp/project"
          adoption_report="$tmp/adoption-assurance.md"
          node "$tmp/project/scripts/resolve-adoption-assurance.mjs" "$tmp/project" > "$adoption_report"
          node "$tmp/project/scripts/check-adoption-assurance.mjs" "$tmp/project" --report "$adoption_report" --require-structured-evidence
          node "$tmp/project/scripts/cli.mjs" doc-lifecycle "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" doc-lifecycle-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" archive-apply "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" archive-apply-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" work-queue "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" work-queue-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" hook-plan "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" hook-plan-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" hook-policy "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" hook-policy-check "$tmp/project"
          node "$tmp/project/scripts/resolve-standard-baseline.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-standard-baseline-pack.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-standard-baseline-selection.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-workflow-version.mjs" "$tmp/project"
