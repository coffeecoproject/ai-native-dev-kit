name: Dev Kit Release Checks

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dev-kit-release-checks:
    name: Dev Kit Release Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dev-kit self-check
        run: node scripts/check-dev-kit.mjs

      - name: Release verify
        run: npm run verify

      - name: Manifest check
        run: node scripts/check-manifest.mjs

      - name: Product baseline check
        run: node scripts/check-product-baseline.mjs .

      - name: Claim control check
        run: node scripts/check-claim-control.mjs .

      - name: Context governance check
        run: node scripts/check-context-governance.mjs .

      - name: Launch readiness check
        run: node scripts/check-launch-readiness.mjs .

      - name: Conversation drift check
        run: node scripts/check-conversation-drift.mjs .

      - name: First delivery walkthrough check
        run: node scripts/check-first-delivery-walkthrough.mjs .

      - name: Real adoption trial check
        run: node scripts/check-real-adoption-trial.mjs .

      - name: Patch classification check
        run: node scripts/check-patch-classification.mjs .

      - name: Workflow adoption map check
        run: node scripts/check-workflow-adoption-map.mjs .

      - name: Workflow map smoke
        run: node scripts/cli.mjs workflow-map .

      - name: Guided delivery check
        run: node scripts/check-guided-delivery-loop.mjs .

      - name: Change boundary check
        run: node scripts/check-change-boundary.mjs .

      - name: Baseline state check
        run: node scripts/check-baseline-state.mjs .

      - name: Baseline decision smoke
        run: node scripts/cli.mjs baseline-decision .

      - name: Baseline decision check
        run: node scripts/cli.mjs baseline-decision-check .

      - name: Baseline decision example strict check
        run: node scripts/check-guided-baseline-selection.mjs examples/1.17-guided-baseline-selection/new-miniprogram --strict

      - name: Standard baseline recommendation smoke
        run: node scripts/cli.mjs standard-baseline .

      - name: Standard baseline pack check
        run: node scripts/check-standard-baseline-pack.mjs .

      - name: Standard baseline selection check
        run: node scripts/check-standard-baseline-selection.mjs .

      - name: Baseline pack umbrella smoke
        run: node scripts/cli.mjs baseline-packs .

      - name: Baseline pack selection check
        run: node scripts/check-baseline-pack-selection.mjs .

      - name: Baseline selection precision check
        run: node scripts/check-baseline-selection-precision.mjs .

      - name: Fixture suite
        run: node scripts/check-fixtures.mjs

      - name: Recursive repository script syntax
        run: find . -name '*.mjs' -not -path './node_modules/*' -print0 | xargs -0 -n1 node --check

      - name: Output quality example
        run: node scripts/score-output-quality.mjs examples/goal-subagent-l2-feature --min-score 80

      - name: Glossary usage
        run: node scripts/check-glossary-usage.mjs .

      - name: Generated-project smoke
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          node scripts/init-project.mjs --starter generic-project --target "$tmp/project"
          node "$tmp/project/scripts/check-ai-workflow.mjs" "$tmp/project" --mode core
          node "$tmp/project/scripts/workflow-next.mjs" "$tmp/project"
          node "$tmp/project/scripts/start-project.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-guided-adoption.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-project-onboarding.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-engineering-baseline.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-product-baseline.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-claim-control.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-context-governance.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-launch-readiness.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-conversation-drift.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-first-delivery-walkthrough.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-real-adoption-trial.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-patch-classification.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-workflow-adoption-map.mjs" "$tmp/project"
          node "$tmp/project/scripts/resolve-existing-workflow.mjs" "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" baseline-decision "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" baseline-decision-check "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" workflow-map "$tmp/project"
          node "$tmp/project/scripts/cli.mjs" workflow-map-check "$tmp/project"
          node "$tmp/project/scripts/resolve-standard-baseline.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-standard-baseline-pack.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-standard-baseline-selection.mjs" "$tmp/project"
          node "$tmp/project/scripts/check-workflow-version.mjs" "$tmp/project"
