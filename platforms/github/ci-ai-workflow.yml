name: AI Workflow Checks

on:
  pull_request:

jobs:
  workflow-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check AI workflow files
        run: node scripts/check-ai-workflow.mjs .
      - name: Check AI workflow next action
        run: node scripts/workflow-next.mjs .
      - name: Check AI workflow version file
        run: node scripts/check-workflow-version.mjs .
      - name: Check project onboarding baseline
        run: node scripts/check-project-onboarding.mjs .
      - name: Check platform baseline
        run: node scripts/check-platform-baseline.mjs .
      - name: Check industrial packs
        run: node scripts/check-industrial-pack.mjs .
      - name: Check industrial baseline
        run: node scripts/check-industrial-baseline.mjs .
      - name: Check workflow item generator syntax
        run: node --check scripts/new-workflow-item.mjs
      - name: Check platform baseline resolver syntax
        run: node --check scripts/resolve-platform-baseline.mjs
      - name: Check platform baseline checker syntax
        run: node --check scripts/check-platform-baseline.mjs
      - name: Check industrial pack checker syntax
        run: node --check scripts/check-industrial-pack.mjs
      - name: Check industrial baseline resolver syntax
        run: node --check scripts/resolve-industrial-baseline.mjs
      - name: Check industrial baseline checker syntax
        run: node --check scripts/check-industrial-baseline.mjs
      - name: Check workflow next syntax
        run: node --check scripts/workflow-next.mjs
      - name: Check workflow artifact quality
        run: node scripts/check-workflow-artifacts.mjs . --mode ready --changed-only --base origin/${{ github.base_ref }}
      - name: Summarize AI workflow logs
        run: node scripts/summarize-ai-logs.mjs .
      - name: Run daily workflow signal check
        run: node scripts/workflow-daily-summary.mjs .
