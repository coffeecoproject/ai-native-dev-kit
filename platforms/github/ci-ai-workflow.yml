name: AI Workflow Checks

on:
  pull_request:

jobs:
  workflow-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check AI workflow files
        run: node scripts/check-ai-workflow.mjs . --mode core
      - name: Check AI workflow next action
        run: node scripts/workflow-next.mjs .
      - name: Check guided adoption entry
        run: node scripts/start-project.mjs .
      - name: Check saved guided adoption reports
        run: node scripts/check-guided-adoption.mjs .
      - name: Check AI workflow version file
        run: node scripts/check-workflow-version.mjs .
      - name: Check project onboarding baseline
        run: node scripts/check-project-onboarding.mjs .
      - name: Check engineering baseline
        run: node scripts/check-engineering-baseline.mjs .
      - name: Check environment baseline
        run: node scripts/check-environment-baseline.mjs .
      - name: Check baseline enforcement
        run: node scripts/check-baseline-enforcement.mjs . --mode ready
      - name: Check product baseline
        run: node scripts/check-product-baseline.mjs .
      - name: Check claim control
        run: node scripts/check-claim-control.mjs .
      - name: Check context governance
        run: node scripts/check-context-governance.mjs .
      - name: Check launch readiness
        run: node scripts/check-launch-readiness.mjs .
      - name: Check conversation drift
        run: node scripts/check-conversation-drift.mjs .
      - name: Check guided delivery loop
        run: node scripts/check-guided-delivery-loop.mjs .
      - name: Check first delivery walkthrough
        run: node scripts/check-first-delivery-walkthrough.mjs .
      - name: Check real adoption trial
        run: node scripts/check-real-adoption-trial.mjs .
      - name: Check patch classification
        run: node scripts/check-patch-classification.mjs .
      - name: Check change boundary
        run: node scripts/check-change-boundary.mjs .
      - name: Check baseline state
        run: node scripts/check-baseline-state.mjs .
      - name: Resolve standard baseline
        run: node scripts/resolve-standard-baseline.mjs .
      - name: Check standard baseline packs
        run: node scripts/check-standard-baseline-pack.mjs .
      - name: Check standard baseline selection
        run: node scripts/check-standard-baseline-selection.mjs .
      - name: Resolve baseline packs umbrella
        run: node scripts/cli.mjs baseline-packs .
      - name: Check baseline pack selection
        run: node scripts/check-baseline-pack-selection.mjs .
      - name: Check platform baseline
        run: node scripts/check-platform-baseline.mjs .
      - name: Check selected industrial packs
        run: node scripts/check-industrial-pack.mjs . --selected-only
      - name: Check BL2 industrial baseline
        run: node scripts/check-industrial-baseline.mjs . --bl2-only
      - name: Check workflow item generator syntax
        run: node --check scripts/new-workflow-item.mjs
      - name: Check platform baseline resolver syntax
        run: node --check scripts/resolve-platform-baseline.mjs
      - name: Check platform baseline checker syntax
        run: node --check scripts/check-platform-baseline.mjs
      - name: Check industrial pack checker syntax
        run: node --check scripts/check-industrial-pack.mjs
      - name: Check industrial baseline resolver syntax
        run: node --check scripts/resolve-industrial-baseline.mjs
      - name: Check industrial baseline checker syntax
        run: node --check scripts/check-industrial-baseline.mjs
      - name: Check workflow next syntax
        run: node --check scripts/workflow-next.mjs
      - name: Check guided adoption entry syntax
        run: node --check scripts/start-project.mjs
      - name: Check guided adoption report checker syntax
        run: node --check scripts/check-guided-adoption.mjs
      - name: Check engineering baseline checker syntax
        run: node --check scripts/check-engineering-baseline.mjs
      - name: Check environment baseline checker syntax
        run: node --check scripts/check-environment-baseline.mjs
      - name: Check baseline enforcement checker syntax
        run: node --check scripts/check-baseline-enforcement.mjs
      - name: Check product baseline checker syntax
        run: node --check scripts/check-product-baseline.mjs
      - name: Check claim control checker syntax
        run: node --check scripts/check-claim-control.mjs
      - name: Check context governance checker syntax
        run: node --check scripts/check-context-governance.mjs
      - name: Check launch readiness checker syntax
        run: node --check scripts/check-launch-readiness.mjs
      - name: Check conversation drift checker syntax
        run: node --check scripts/check-conversation-drift.mjs
      - name: Check first delivery walkthrough checker syntax
        run: node --check scripts/check-first-delivery-walkthrough.mjs
      - name: Check real adoption trial checker syntax
        run: node --check scripts/check-real-adoption-trial.mjs
      - name: Check patch classification checker syntax
        run: node --check scripts/check-patch-classification.mjs
      - name: Check guided delivery loop checker syntax
        run: node --check scripts/check-guided-delivery-loop.mjs
      - name: Check change boundary checker syntax
        run: node --check scripts/check-change-boundary.mjs
      - name: Check baseline state checker syntax
        run: node --check scripts/check-baseline-state.mjs
      - name: Check standard baseline resolver syntax
        run: node --check scripts/resolve-standard-baseline.mjs
      - name: Check standard baseline pack checker syntax
        run: node --check scripts/check-standard-baseline-pack.mjs
      - name: Check standard baseline selection checker syntax
        run: node --check scripts/check-standard-baseline-selection.mjs
      - name: Check baseline pack resolver syntax
        run: node --check scripts/resolve-baseline-packs.mjs
      - name: Check baseline pack selection checker syntax
        run: node --check scripts/check-baseline-pack-selection.mjs
      - name: Check baseline recommendation syntax
        run: node --check scripts/baseline-project.mjs
      - name: Check workflow artifact quality
        run: node scripts/check-workflow-artifacts.mjs . --mode ready --changed-only --base origin/${{ github.base_ref }}
      - name: Check review loop semantics
        run: node scripts/check-review-loop.mjs .
      - name: Check next-step boundary semantics
        run: node scripts/check-next-step-boundary.mjs .
      - name: Check Goal Mode semantics
        run: node scripts/check-goal-mode.mjs .
      - name: Check Subagent Orchestration semantics
        run: node scripts/check-subagent-orchestration.mjs .
      - name: Summarize AI workflow logs
        run: node scripts/summarize-ai-logs.mjs .
      - name: Run daily workflow signal check
        run: node scripts/workflow-daily-summary.mjs .
